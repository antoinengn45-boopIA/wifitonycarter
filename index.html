<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu Dino Chrome — Hors-connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f7f7f7;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: #2b2b2b;
  }

  /* Style pour le conteneur du logo Poki */
  #poki-logo-container {
    margin-top: 10px;
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  h1 {
    font-size: 18px;
    font-weight: normal;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  p.subtitle {
    font-size: 12px;
    color: #767676;
    text-align: center;
    margin-bottom: 16px;
  }

  #game-wrapper {
    position: relative;
    width: 600px;
    max-width: 100%;
  }

  #score-board {
    display: flex;
    justify-content: flex-end;
    gap: 24px;
    font-size: 13px;
    letter-spacing: 2px;
    color: #767676;
    margin-bottom: 4px;
    padding-right: 2px;
    align-items: center;
  }

  #pro-badge {
    display: none;
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: bold;
    color: #00cc44;
    border: 1.5px solid #00cc44;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: auto;
    animation: problink 1s step-start infinite;
  }
  #pro-badge.on { display: inline-block; }
  @keyframes problink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #score-board span { color: #2b2b2b; font-weight: bold; }

  canvas {
    display: block;
    width: 100%;
    border-bottom: 2px solid #2b2b2b;
    cursor: pointer;
    image-rendering: pixelated;
  }

  #message {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 1px;
    color: #767676;
    min-height: 18px;
  }

  #hiscores {
    display: flex;
    gap: 40px;
    margin-top: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .score-col h2 {
    font-size: 11px;
    letter-spacing: 2px;
    color: #767676;
    margin-bottom: 8px;
    font-weight: normal;
    text-transform: uppercase;
  }

  .score-col ul { list-style: none; width: 220px; }
  .score-col ul li {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
    border-bottom: 1px solid #e0e0e0;
  }
  .score-col ul li .name { color: #2b2b2b; }
  .score-col ul li .pts { font-weight: bold; }

  footer {
    margin-top: 32px;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 1px;
    text-align: center;
  }

  @media (max-width: 640px) {
    #game-wrapper { width: 100%; }
    canvas { image-rendering: auto; }
  }
</style>
</head>
<body>

<div id="poki-logo-container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 195" width="130">
    <g fill="#FFD400">
      <path d="M0 0h124c34 0 57 8 71 25 13 15 17 35 15 54-4 35-29 55-66 55H63v61H0V0zm63 49v38h45c12 0 19-5 20-13 1-10-6-15-18-15H63z"/>
      <path d="M194 92c0-54 39-95 97-95s93 41 93 95-38 96-95 96-95-42-95-96zm126 1c1-26-11-46-30-46-20 1-32 20-32 46 0 25 12 46 31 46 20 0 31-20 31-46z"/>
      <path d="M393 0h63v84l52-84h66l-67 94 74 101h-69l-56-82v82h-63V0z"/>
      <path d="M592 0h63v195h-63V0z"/>
    </g>
    <circle cx="695" cy="162" r="33" fill="#FF4757" />
  </svg>
</div>

<h1>DINO CHROME GAME</h1>
<p class="subtitle">ESPACE = sauter &nbsp;|&nbsp; ↓ = s'accroupir &nbsp;|&nbsp; Toucher l'écran = sauter</p>

<div id="game-wrapper">
  <div id="score-board">
    <span id="pro-badge">⚡ DINO-PRO</span>
    HI <span id="hi-score">00000</span> &nbsp; <span id="cur-score">00000</span>
  </div>
  <canvas id="c" width="600" height="150"></canvas>
  <div id="message">APPUYER SUR ESPACE POUR DÉMARRER</div>
</div>

<div id="hiscores">
  <div class="score-col">
    <h2>Top 5 du jour</h2>
    <ul id="daily-list"></ul>
  </div>
  <div class="score-col">
    <h2>Top 5 all time</h2>
    <ul id="alltime-list"></ul>
  </div>
</div>

<footer>© 2024 — Dino hors-connexion de Google Chrome by Antoine</footer>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 150;
const GROUND = 118;
const GRAVITY = 0.6;
const JUMP_V = -12;
const DUCK_H = 26;

// ---- Pixel art drawing helpers ----
function fillRect(x, y, w, h) { ctx.fillRect(Math.round(x), Math.round(y), w, h); }

function drawDino(x, y, frame, ducking) {
  ctx.fillStyle = DinoPro.active ? '#00aa33' : '#535353';
  if (ducking) {
    // Body ducked
    fillRect(x, y + 14, 44, 14);
    // Head
    fillRect(x + 28, y + 6, 14, 12);
    // Eye
    ctx.fillStyle = '#f7f7f7';
    fillRect(x + 36, y + 8, 4, 4);
    ctx.fillStyle = '#535353';
    fillRect(x + 38, y + 9, 2, 2);
    // Legs
    const lx = frame === 0 ? 2 : 12;
    ctx.fillStyle = '#535353';
    fillRect(x + lx, y + 26, 8, 6);
    fillRect(x + lx + 14, y + 26, 8, 6);
  } else {
    // Body
    fillRect(x + 4, y + 4, 36, 34);
    // Head
    fillRect(x + 24, y, 20, 18);
    // Jaw
    fillRect(x + 24, y + 14, 14, 6);
    // Eye
    ctx.fillStyle = '#f7f7f7';
    fillRect(x + 32, y + 3, 6, 6);
    ctx.fillStyle = '#535353';
    fillRect(x + 34, y + 4, 3, 3);
    // Arm
    fillRect(x + 16, y + 22, 10, 4);
    // Tail
    fillRect(x, y + 14, 10, 6);
    fillRect(x - 4, y + 20, 8, 4);
    // Legs
    const lx = frame === 0 ? 4 : 16;
    fillRect(x + lx, y + 36, 8, 12);
    fillRect(x + lx + 12, y + 36, 8, 12);
  }
}

function drawCactus(x, y, type) {
  ctx.fillStyle = '#535353';
  if (type === 0) {
    // Single cactus
    fillRect(x + 6, y, 8, 36);
    fillRect(x, y + 10, 6, 6);
    fillRect(x + 14, y + 8, 6, 8);
    fillRect(x, y + 6, 6, 4);
    fillRect(x + 14, y + 4, 6, 4);
  } else if (type === 1) {
    // Double cactus
    fillRect(x + 6, y, 8, 36);
    fillRect(x, y + 10, 6, 6);
    fillRect(x + 14, y + 8, 6, 8);
    fillRect(x + 26, y + 4, 8, 32);
    fillRect(x + 20, y + 14, 6, 6);
    fillRect(x + 34, y + 12, 6, 6);
  } else {
    // Triple cactus
    fillRect(x + 6, y + 6, 8, 30);
    fillRect(x, y + 16, 6, 6);
    fillRect(x + 14, y + 14, 6, 6);
    fillRect(x + 22, y, 8, 36);
    fillRect(x + 16, y + 10, 6, 6);
    fillRect(x + 30, y + 8, 6, 8);
    fillRect(x + 38, y + 8, 8, 28);
    fillRect(x + 32, y + 18, 6, 6);
    fillRect(x + 46, y + 16, 6, 6);
  }
}

function drawBird(x, y, frame) {
  ctx.fillStyle = '#535353';
  // Body
  fillRect(x + 4, y + 8, 28, 12);
  // Head
  fillRect(x + 26, y + 4, 12, 8);
  // Beak
  fillRect(x + 38, y + 6, 8, 4);
  // Wings
  if (frame === 0) {
    fillRect(x, y, 12, 8);
    fillRect(x + 12, y + 4, 8, 4);
  } else {
    fillRect(x, y + 14, 12, 8);
    fillRect(x + 12, y + 14, 8, 4);
  }
  // Eye
  ctx.fillStyle = '#f7f7f7';
  fillRect(x + 30, y + 5, 4, 4);
  ctx.fillStyle = '#535353';
  fillRect(x + 31, y + 6, 2, 2);
}

function drawCloud(x, y) {
  ctx.fillStyle = '#e0e0e0';
  fillRect(x + 10, y + 4, 30, 10);
  fillRect(x + 4, y + 8, 44, 8);
  fillRect(x, y + 10, 54, 6);
  fillRect(x + 14, y, 20, 6);
  fillRect(x + 8, y + 2, 20, 6);
}

function padScore(n) { return String(Math.floor(n)).padStart(5, '0'); }



// ---- Game State ----
let state = 'idle'; // idle | running | dead
let score = 0;
let hiScore = 0;
let speed = 5;
let frame = 0;
let animTick = 0;
let dinoFrame = 0;

let dino = { x: 40, y: GROUND - 48, vy: 0, ducking: false, h: 48 };
let obstacles = [];
let birds = [];
let clouds = [];
let groundX = 0;
let groundX2 = W;
let nextObstacleIn = 80;
let nextBirdIn = 200;
let nextCloudIn = 60;

function resetGame() {
  score = 0;
  speed = 5;
  frame = 0;
  animTick = 0;
  dinoFrame = 0;
  dino = { x: 40, y: GROUND - 48, vy: 0, ducking: false, h: 48 };
  obstacles = [];
  birds = [];
  clouds = [];
  groundX = 0;
  groundX2 = W;
  nextObstacleIn = 80;
  nextBirdIn = 200;
  nextCloudIn = 60;
}

function jump() {
  if (dino.y >= GROUND - dino.h - 1) {
    dino.vy = JUMP_V;
  }
}

function duck(on) {
  dino.ducking = on;
  dino.h = on ? DUCK_H : 48;
  if (on && dino.y < GROUND - dino.h) {
    dino.y = GROUND - dino.h;
  }
}

function spawnObstacle() {
  const type = Math.floor(Math.random() * 3);
  const widths = [20, 48, 54];
  obstacles.push({ x: W + 10, type, w: widths[type], h: 36 });
  nextObstacleIn = 60 + Math.random() * 80 + Math.max(0, (10 - speed) * 8);
}

function spawnBird() {
  const heights = [GROUND - 60, GROUND - 80, GROUND - 48];
  const hy = heights[Math.floor(Math.random() * heights.length)];
  birds.push({ x: W + 10, y: hy, frame: 0, tick: 0 });
  nextBirdIn = 150 + Math.random() * 120;
}

function spawnCloud() {
  clouds.push({ x: W + 10, y: 20 + Math.random() * 30 });
  nextCloudIn = 40 + Math.random() * 60;
}

function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function checkCollisions() {
  const dx = dino.x + 6, dy = dino.y + 4, dw = dino.ducking ? 38 : 28, dh = dino.h - 6;
  for (const o of obstacles) {
    if (rectOverlap(dx, dy, dw, dh, o.x + 2, GROUND - o.h + 2, o.w - 4, o.h - 4)) return true;
  }
  for (const b of birds) {
    if (rectOverlap(dx, dy, dw, dh, b.x + 4, b.y + 4, 36, 16)) return true;
  }
  return false;
}

function update() {
  if (state !== 'running') return;

  frame++;
  score += speed / 10;
  speed = 5 + score / 500;
  if (speed > 14) speed = 14;

  // Dino physics
  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND - dino.h) {
    dino.y = GROUND - dino.h;
    dino.vy = 0;
  }

  // Anim
  animTick++;
  if (animTick % 8 === 0) dinoFrame = 1 - dinoFrame;

  // Ground scroll
  groundX -= speed;
  groundX2 -= speed;
  if (groundX < -W) groundX += W * 2;
  if (groundX2 < -W) groundX2 += W * 2;

  // Obstacles
  nextObstacleIn--;
  if (nextObstacleIn <= 0) spawnObstacle();
  for (const o of obstacles) o.x -= speed;
  obstacles = obstacles.filter(o => o.x + o.w > -10);

  // Birds
  nextBirdIn--;
  if (nextBirdIn <= 0 && score > 200) spawnBird();
  for (const b of birds) {
    b.x -= speed;
    b.tick++;
    if (b.tick % 10 === 0) b.frame = 1 - b.frame;
  }
  birds = birds.filter(b => b.x + 50 > -10);

  // Clouds
  nextCloudIn--;
  if (nextCloudIn <= 0) spawnCloud();
  for (const c of clouds) c.x -= speed * 0.3;
  clouds = clouds.filter(c => c.x + 60 > -10);

  if (!DinoPro.isImmortal() && checkCollisions()) {
    state = 'dead';
    if (score > hiScore) hiScore = score;
    document.getElementById('message').textContent = 'GAME OVER — APPUYER SUR ESPACE POUR REJOUER';
    updateScoreDisplay();
  }
}

function drawGround() {
  ctx.fillStyle = '#535353';
  fillRect(0, GROUND, W, 2);
  // Ground texture dots
  ctx.fillStyle = '#aaa';
  for (let gx = groundX % 20; gx < W; gx += 20) fillRect(gx, GROUND + 2, 4, 2);
  for (let gx = groundX2 % 20; gx < W; gx += 20) fillRect(gx + 10, GROUND + 6, 6, 2);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f7f7f7';
  fillRect(0, 0, W, H);

  // Clouds
  for (const c of clouds) drawCloud(c.x, c.y);

  drawGround();

  // Obstacles
  for (const o of obstacles) drawCactus(o.x, GROUND - o.h, o.type);

  // Birds
  for (const b of birds) drawBird(b.x, b.y, b.frame);

  // Dino
  const running = state === 'running';
  drawDino(dino.x, dino.y, running ? dinoFrame : 0, dino.ducking);

  // Score
  document.getElementById('cur-score').textContent = padScore(score);
  document.getElementById('hi-score').textContent = padScore(hiScore);

  // Idle dino wink
  if (state === 'idle') {
    ctx.fillStyle = '#535353';
    fillRect(dino.x + 34, dino.y + 4, 3, 3);
  }

  // Dead X eyes
  if (state === 'dead') {
    ctx.fillStyle = '#535353';
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#535353';
    ctx.beginPath();
    ctx.moveTo(dino.x + 32, dino.y + 3); ctx.lineTo(dino.x + 37, dino.y + 8);
    ctx.moveTo(dino.x + 37, dino.y + 3); ctx.lineTo(dino.x + 32, dino.y + 8);
    ctx.stroke();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  if (state === 'idle' || state === 'dead') {
    resetGame();
    state = 'running';
    document.getElementById('message').textContent = '';
    if (DinoPro.active) DinoPro._startAutoJump();
  }
}

// ---- DINO-PRO ----
const DinoPro = {
  active: false,
  _autoInterval: null,

  init: function() {
    console.log('%c [DinoPro] Système activé avec succès !', 'color:#00ff00;font-weight:bold;');
    this.active = true;
    document.getElementById('pro-badge').classList.add('on');
    document.getElementById('message').textContent = '⚡ DINO-PRO ACTIVÉ — Ne meurs pas';
    setTimeout(() => {
      if (state !== 'dead' && state !== 'idle')
        document.getElementById('message').textContent = '';
    }, 2000);
    this._startAutoJump();
  },

  deactivate: function() {
    console.log('%c [DinoPro] Désactivé.', 'color:#ff4444;font-weight:bold;');
    this.active = false;
    document.getElementById('pro-badge').classList.remove('on');
    document.getElementById('message').textContent = '⚡ DINO-PRO DÉSACTIVÉ';
    setTimeout(() => {
      if (state !== 'dead' && state !== 'idle')
        document.getElementById('message').textContent = '';
    }, 1500);
    if (this._autoInterval) { clearInterval(this._autoInterval); this._autoInterval = null; }
  },

  toggle: function() {
    if (this.active) this.deactivate();
    else this.init();
  },

  isImmortal: function() { return this.active; },

  _startAutoJump: function() {
    if (this._autoInterval) clearInterval(this._autoInterval);
    this._autoInterval = setInterval(() => {
      if (!this.active || state !== 'running') return;

      let nearest = null;
      let minX = Infinity;

      for (const o of obstacles) {
        const dist = o.x - (dino.x + 40);
        if (dist > 0 && dist < minX) { minX = dist; nearest = o; }
      }
      for (const b of birds) {
        const dist = b.x - (dino.x + 40);
        if (dist > 0 && dist < minX) { minX = dist; nearest = b; }
      }

      if (nearest) {
        const threshold = 35 + speed * 0.5;

        if (nearest.y !== undefined) {
          const birdLow = nearest.y > GROUND - 55;
          if (birdLow && minX < threshold + 10) {
            duck(true);
            setTimeout(() => duck(false), 300);
            return;
          }
        }

        if (minX < threshold) jump();
      }
    }, 5);
  },
};

let _lastSpaceTime = 0;

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (e.code === 'Space') {
      const now = Date.now();
      if (now - _lastSpaceTime < 400) {
        _lastSpaceTime = 0;
        if (state === 'idle' || state === 'dead') startGame();
        DinoPro.toggle();
        return;
      }
      _lastSpaceTime = now;
    }
    if (state === 'running') jump();
    else startGame();
  }
  if (e.code === 'ArrowDown' && state === 'running') {
    e.preventDefault();
    duck(true);
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') duck(false);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'running') jump();
  else startGame();
}, { passive: false });
canvas.addEventListener('click', () => {
  if (state === 'running') jump();
  else startGame();
});

// Leaderboard
const dailyScores = [
  { name: 'Antoine', pts: 107142 },
  { name: 'Liloue', pts: 105106 },
  { name: 'Yuki', pts: 5529 },
  { name: 'Timothée', pts: 4191 },
  { name: 'Anonymous', pts: 4095 },
];
const alltimeScores = [
  { name: 'Thomasptz', pts: 107142 },
  { name: 'Drak', pts: 105106 },
  { name: 'Kerozen', pts: 105097 },
  { name: 'Nikita', pts: 41647 },
  { name: 'Spike', pts: 29252 },
];

function renderList(id, data) {
  const ul = document.getElementById(id);
  ul.innerHTML = data.map(s =>
    `<li><span class="name">${s.name}</span><span class="pts">${s.pts.toLocaleString('fr')}</span></li>`
  ).join('');
}

function updateScoreDisplay() {
  renderList('daily-list', dailyScores);
  renderList('alltime-list', alltimeScores);
}

updateScoreDisplay();
loop();
</script>

</body>
</html>
